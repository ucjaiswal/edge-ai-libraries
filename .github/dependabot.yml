# update the submodules on a weekly interval
version: 2
updates:

  # ─────────────────────────────────────────
  # Existing — Git Submodules
  # ─────────────────────────────────────────
  - package-ecosystem: gitsubmodule
    directory: "/"
    cooldown:
      default-days: 7
    schedule:
      interval: "weekly"

  # ─────────────────────────────────────────
  # Existing — GitHub Actions
  # ─────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    open-pull-requests-limit: 5
    groups:
      github-actions-dependency:
        applies-to: version-updates
        patterns:
          - "*"

  # ─────────────────────────────────────────
  # Python (pip) — Microservices
  # ─────────────────────────────────────────
