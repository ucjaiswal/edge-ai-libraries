# DO NOT COMMIT/PUSH THIS FILE TO ANY REPO WITH UPDATED VALUES. IT CAN LEAD TO CREDENTIAL LEAKS.
# RESET ALL THE VALUES HERE TO DEFAULT, BEFORE COMMITING/PUSHING.
global:
  # Single source of override for image registry and tag across VSS service images
  # (pipeline-manager, video-ingestion, video-search, vss-ui, vdms-dataprep,
  # multimodal-embedding-serving). Leave empty to keep each subchart's own defaults.
  #   registry: pull the VSS images from this registry (bare image name is kept).
  #   tag: override the tag for the VSS images above.
  # Example:
  #   registry: "docker.io/intel"
  #   tag: "latest"
  registry: ""
  tag: ""
  # pullPolicy overrides imagePullPolicy for the VSS service images above.
  # Leave empty to keep the default (IfNotPresent); set "Always" to force a pull on every start.
  pullPolicy: ""

  # accelGroupIds are the host group ids owning the accelerator device nodes
  # (/dev/dri for GPU, /dev/accel for NPU). They are added to the pod
  # supplementalGroups for any service configured to use a GPU or NPU, so the
  # non-root container user can open the device. This mirrors the compose
  # `group_add` (render + video groups). The gids are host-specific, so set them to
  # match the device-node owners on the target node:
  #   ls -ln /dev/accel   # NPU  (gid in the 3rd column)
  #   ls -ln /dev/dri     # GPU  (render/video gids)
  accelGroupIds:
    - 992

  # usePvc should be set to true to use a new PVC for storage required by any of the subchart.
  usePvc: true

  # keepPvc should be set to true to retain the PVC after uninstalling the chart.
  keepPvc: false

  # Update huggingfaceToken if access to gated OVMS models is required.
  huggingfaceToken: ""

  # vlmName is the OVMS or vLLM Vision-Language Model used for captioning.
  vlmName: ""
  # llmName is optional when OVMS serves a separate summarization model.
  llmName: ""

  # Update http_proxy and https_proxy with appropriate values if a proxy is required for external access.
  proxy:
    http_proxy: ""
    https_proxy: ""

  env:
    # Update following credentials with a values of your choice - as this is required by respective microservices.
    POSTGRES_USER: ""
    POSTGRES_PASSWORD: ""
    MINIO_ROOT_USER: ""
    MINIO_ROOT_PASSWORD: ""
    RABBITMQ_DEFAULT_USER: ""
    RABBITMQ_DEFAULT_PASS: ""

    # Update these values for telemetry if required. Leave empty if telemetry is not used.
    OTLP_ENDPOINT: ""
    OTLP_ENDPOINT_TRACE: ""

  # Embedding model used by Multimodal Embedding MS, DataPrep, and Video Search.
  # Set a model appropriate for your deployment mode:
  #   - Search-only and Dual mode: use a multimodal model, e.g., "CLIP/clip-vit-b-32"
  #   - Unified mode: use a text embedding model, e.g., "QwenText/qwen3-embedding-0.6b"
  # See supported models: https://github.com/open-edge-platform/edge-ai-libraries/blob/main/microservices/multimodal-embedding-serving/docs/user-guide/supported-models.md
  embeddingModelName: ""

  # Per-service device configuration
  # Each service can independently specify its device (CPU | GPU | NPU) and K8s resource key.
  # For OVMS, each model (vlm/llm) can have different device settings.
  # NOTE: 'key' is REQUIRED when device is not CPU (GPU, NPU, or HETERO).
  devices:
    # Multimodal Embedding Microservice
    multimodalEmbedding:
      device: CPU # CPU | GPU | NPU
      key: "" # Required when device=GPU/NPU (e.g., gpu.intel.com/i915, npu.intel.com/accel)

    # VDMS Dataprep
    vdmsDataprep:
      embedding:
        device: CPU # CPU | GPU | NPU
        key: "" # Required when device=GPU/NPU (e.g., gpu.intel.com/i915, npu.intel.com/accel)
      detection:
        device: CPU # CPU | GPU | NPU
        key: "" # Required when device=GPU/NPU (e.g., gpu.intel.com/i915, npu.intel.com/accel)

    # OVMS - per-model device selection
    ovms:
      vlm:
        device: CPU # CPU | GPU | NPU | HETERO:GPU,CPU
        key: "" # Required when device is GPU/NPU/HETERO (e.g., gpu.intel.com/xe, npu.intel.com/accel)
      llm:
        device: CPU # CPU | GPU | NPU | HETERO:GPU,CPU
        key: "" # Required when device is GPU/NPU/HETERO
ovms:
  env:
    # Override weight format for VLM model conversion (auto-detected by device if not set). Options: int4, int8 etc
    VLM_WEIGHT_FORMAT: ""
    # Override weight format for LLM model conversion (auto-detected by device if not set). Options: int4, int8 etc
    LLM_WEIGHT_FORMAT: ""

videoingestion:
  # odModelName defines the name of Object Detection Model
  odModelName: ""
  # odModelType defines the type of Object Detection Model. e.g., "yolo_v8"
  odModelType: ""

vsscollector:
  enabled: false
