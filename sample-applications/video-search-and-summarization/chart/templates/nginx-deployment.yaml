apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "nginx.fullname" . }}-config
data:
  default.conf: |+
    # Config for nginx mounted to /etc/nginx/conf.d in the pod

    server {
        listen       80;
        listen  [::]:80;
        {{- $dualUi := and .Values.summaryui.enabled .Values.searchui.enabled }}

        client_max_body_size 500M;
        proxy_read_timeout 1800s;
        proxy_connect_timeout 300s;
        proxy_send_timeout 1800s;
        send_timeout 1800s;
        keepalive_timeout 1800s;

        {{- if $dualUi }}
        # Dual UI mode: path-based routing to separate Summary and Search UIs
        location /summary/ {
            proxy_pass http://{{ include "vssui.name" .Subcharts.summaryui }}/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        location = /summary {
            return 301 $scheme://$http_host/summary/;
        }

        location = / {
            return 301 $scheme://$http_host/summary/;
        }

        location /search/ {
            proxy_pass http://{{ include "vssui.name" .Subcharts.searchui }}/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        location = /search {
            return 301 $scheme://$http_host/search/;
        }
        {{- else }}
        # Singleton UI mode: route all UI traffic to the single UI instance
        location / {
            {{- if .Values.summaryui.enabled }}
            proxy_pass http://{{ include "vssui.name" .Subcharts.summaryui }}/;
            {{- else }}
            proxy_pass http://{{ include "vssui.name" .Subcharts.searchui }}/;
            {{- end }}
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
        {{- end }}

        location /manager/ {
            proxy_pass http://{{ .Values.pipelinemanager.name }}:80/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # Telemetry WebSocket fan-out served by Pipeline Manager
        location /manager/metrics/ws/ {
            proxy_pass http://{{ .Values.pipelinemanager.name }}:80/metrics/ws/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;
        }

        location /ws/ {
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Host $host;

            proxy_pass http://{{ .Values.pipelinemanager.name }}:80/ws/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        location /minio/ {
            proxy_pass http://{{ include "minioserver.name" .Subcharts.minioserver }}:{{ .Values.minioserver.service.apiPort }}/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        {{- if .Values.ovms.enabled }}
        # OVMS Prometheus metrics endpoint
        location /ovms/metrics {
            proxy_pass http://{{ .Values.ovms.name }}:{{ .Values.ovms.service.port }}/metrics;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        {{- end }}

    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "nginx.fullname" . }}
  labels:
    {{- include "video-summarization.labels" . | nindent 4 }}
    app: {{ include "nginx.fullname" . }}
spec:
  selector:
    matchLabels:
      app: {{ include "nginx.fullname" . }}
  template:
    metadata:
      labels:
        app: {{ include "nginx.fullname" . }}
    spec:
      containers:
      - image: nginx:1.27.5
        imagePullPolicy: {{ .Values.pipelinemanager.image.pullPolicy }}
        name: nginx
        volumeMounts:
        - mountPath: /etc/nginx/conf.d
          name: nginx-config-volume
        ports:
        - containerPort: 80
          name: {{ .Values.nginx.containerPortName }}
      securityContext: {}
      volumes:
      - configMap:
          defaultMode: 420
          name: {{ include "nginx.fullname" . }}-config
        name: nginx-config-volume
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "nginx.fullname" . }}
spec:
  ports:
  - port: {{ .Values.nginx.service.port }}
    protocol: TCP
    targetPort: {{ .Values.nginx.containerPortName }}
  selector:
    app: {{ include "nginx.fullname" . }}
  type: NodePort
