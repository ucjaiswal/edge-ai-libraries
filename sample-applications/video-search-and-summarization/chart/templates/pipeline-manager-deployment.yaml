{{- /* OVMS device configuration from global.devices.ovms */ -}}
{{- $ovmsVlmDevice := default "CPU" .Values.global.devices.ovms.vlm.device -}}
{{- $ovmsLlmDevice := default "CPU" .Values.global.devices.ovms.llm.device -}}
{{- $ovmsVlmUsesGpu := contains "GPU" $ovmsVlmDevice -}}
{{- $ovmsVlmUsesAccelerator := or (contains "GPU" $ovmsVlmDevice) (contains "NPU" $ovmsVlmDevice) -}}
{{- $useVllm := .Values.vllm.enabled -}}
{{- $ovmsChartEnv := .Values.ovms.env -}}
{{- $ovmsParentEnv := .Values.env -}}
{{- /* Weight format: use explicit value or auto-detect based on device */ -}}
{{- $ovmsVlmWeightFormat := default (ternary "int4" "int8" (or (contains "GPU" $ovmsVlmDevice) (contains "NPU" $ovmsVlmDevice))) (default $ovmsChartEnv.VLM_WEIGHT_FORMAT $ovmsParentEnv.VLM_WEIGHT_FORMAT) -}}
{{- $ovmsLlmWeightFormat := default (ternary "int4" "int8" (or (contains "GPU" $ovmsLlmDevice) (contains "NPU" $ovmsLlmDevice))) (default $ovmsChartEnv.LLM_WEIGHT_FORMAT $ovmsParentEnv.LLM_WEIGHT_FORMAT) -}}
{{- /* Generate storage model names for OVMS */ -}}
{{- $vlmSanitized := .Values.global.vlmName | replace "/" "_" | replace ":" "_" | replace " " "_" -}}
{{- $vlmIsOpenvino := hasPrefix "OpenVINO/" .Values.global.vlmName -}}
{{- $vlmStorageName := ternary (printf "%s_%s" $vlmSanitized $ovmsVlmDevice) (printf "%s_%s_%s" $vlmSanitized $ovmsVlmDevice $ovmsVlmWeightFormat) $vlmIsOpenvino -}}
{{- $effectiveOvmLlmModel := default .Values.global.vlmName .Values.global.llmName -}}
{{- $llmSanitized := $effectiveOvmLlmModel | replace "/" "_" | replace ":" "_" | replace " " "_" -}}
{{- $llmIsOpenvino := hasPrefix "OpenVINO/" $effectiveOvmLlmModel -}}
{{- $ovmsSplitModel := or (ne $effectiveOvmLlmModel .Values.global.vlmName) (ne $ovmsLlmDevice $ovmsVlmDevice) (ne $ovmsLlmWeightFormat $ovmsVlmWeightFormat) -}}
{{- $llmStorageName := $vlmStorageName -}}
{{- if $ovmsSplitModel -}}
{{- $llmStorageName = ternary (printf "%s_%s" $llmSanitized $ovmsLlmDevice) (printf "%s_%s_%s" $llmSanitized $ovmsLlmDevice $ovmsLlmWeightFormat) $llmIsOpenvino -}}
{{- end -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pipelinemanager.fullname" . }}
  labels:
    app: {{ .Values.pipelinemanager.name }}
spec:
  replicas: {{ .Values.pipelinemanager.replicaCount | default 1 }}
  selector:
    matchLabels:
      app: {{ .Values.pipelinemanager.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.pipelinemanager.name }}
    spec:
      initContainers:
        {{- if .Values.videosearch.enabled }}
        - name: wait-for-videosearch
          image: curlimages/curl:latest
          command:
            - sh
            - -c
            - |
              echo "Waiting for Video Search service to be ready..."
              until curl -s -f http://{{ include "videosearch.name" .Subcharts.videosearch  }}:{{ .Values.videosearch.service.port }}/health; do
                echo "Video Search service is not ready yet, waiting..."
                sleep 10
              done
              echo "Video Search service is ready!"
        {{- end }}
        {{- if .Values.ovms.enabled }}
        - name: wait-for-ovms
          image: curlimages/curl:latest
          command:
            - sh
            - -c
            - |
              echo "Waiting for OVMS service to be ready..."
              RETRIES=0
              MAX_RETRIES=120
              until [ $RETRIES -ge $MAX_RETRIES ] || curl -s -f -m 10 http://{{ .Values.ovms.name }}:{{ .Values.ovms.service.port }}/v2/health/ready; do
                RETRIES=$((RETRIES+1))
                echo "OVMS service is not ready yet, waiting... (Attempt $RETRIES of $MAX_RETRIES) on {{ .Values.ovms.name }}:{{ .Values.ovms.service.port }}/v2/health/ready"
                if [ $RETRIES -ge $MAX_RETRIES ]; then
                  echo "OVMS service health check failed after $MAX_RETRIES attempts"
                  exit 1
                fi
                sleep 10
              done
              echo "OVMS service is ready!"
        {{- end }}
        {{- if .Values.vllm.enabled }}
        - name: wait-for-vllm
          image: curlimages/curl:latest
          command:
            - sh
            - -c
            - |
              echo "Waiting for vLLM service to be ready..."
              RETRIES=0
              MAX_RETRIES=120
              until [ $RETRIES -ge $MAX_RETRIES ] || curl -s -f -m 10 http://{{ .Values.vllm.service.name }}:{{ .Values.vllm.service.port }}/health; do
                RETRIES=$((RETRIES+1))
                echo "vLLM service is not ready yet, waiting... (Attempt $RETRIES of $MAX_RETRIES) on {{ .Values.vllm.service.name }}:{{ .Values.vllm.service.port }}/health"
                if [ $RETRIES -ge $MAX_RETRIES ]; then
                  echo "vLLM service health check failed after $MAX_RETRIES attempts"
                  exit 1
                fi
                sleep 10
              done
              echo "vLLM service is ready!"
        {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.pipelinemanager.image.repository }}:{{ .Values.pipelinemanager.image.tag }}"
          imagePullPolicy: {{ .Values.pipelinemanager.image.pullPolicy }}
          {{- with .Values.pipelinemanager.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - containerPort: 3000
              name: {{ .Values.pipelinemanager.containerPortName }}
          {{- with .Values.pipelinemanager.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            - name: no_proxy
              value: "{{ .Values.global.proxy.no_proxy }},audioanalyzer,multimodal-embedding-ms,vdms-dataprep,vdms-vectordb,videosearch,pipelinemanager,videoingestion,minio-server,postgresql,video-summary-nginx,ovms,rabbitmq,summary-ui,search-ui,unified-ui,{{ .Values.vllm.service.name }},{{ .Values.vllm.service.name }}.{{ .Release.Namespace }}.svc.cluster.local,"
            - name: http_proxy
              value: "{{ .Values.global.proxy.http_proxy }}"
            - name: https_proxy
              value: "{{ .Values.global.proxy.https_proxy }}"
            - name: MINIO_PROTOCOL
              value: {{ .Values.pipelinemanager.minioProtocol | quote }}
            - name: MINIO_HOST
              value: {{ include "minioserver.name" .Subcharts.minioserver }}
            - name: MINIO_PORT
              value: {{ .Values.minioserver.service.apiPort | quote }}
            - name: MINIO_ROOT_USER
              value: {{ required "Value for MINIO_ROOT_USER is required and cannot be empty!" .Values.global.env.MINIO_ROOT_USER | quote }}
            - name: MINIO_ROOT_PASSWORD
              value: {{ required "Value for MINIO_ROOT_PASSWORD is required!" .Values.global.env.MINIO_ROOT_PASSWORD | quote }}
            - name: MINIO_BUCKET
              value: {{ .Values.pipelinemanager.minioBucket | quote }}
            - name: EVAM_HOST
              value: "{{ .Values.videoingestion.name }}"
            - name: EVAM_PIPELINE_PORT
              value: "{{ .Values.videoingestion.service.port }}"
            - name: EVAM_PUBLISH_PORT
              value: "{{ .Values.rabbitmq.service.mqttPort }}"
            - name: EVAM_DEVICE
              value: "CPU"
            - name: RABBITMQ_HOST
              value: "{{ .Values.rabbitmq.name }}"
            - name: RABBITMQ_USER
              value: {{ required "Value for RABBITMQ_DEFAULT_USER is required!" .Values.global.env.RABBITMQ_DEFAULT_USER | quote }}
            - name: RABBITMQ_PASSWORD
              value: {{ required "Value for RABBITMQ_DEFAULT_PASS is required!" .Values.global.env.RABBITMQ_DEFAULT_PASS | quote }}
            - name: RABBITMQ_AMQP_PORT
              value: "{{ .Values.rabbitmq.service.amqpPort }}"
            - name: LLM_SUMMARIZATION_KEY
              value: "{{ .Values.pipelinemanager.env.LLM_SUMMARIZATION_KEY }}"
            - name: LLM_SUMMARIZATION_API
              value: {{ if $useVllm }}{{ printf "http://%s:%d/v1" (default "cpu-vllm-service" .Values.vllm.service.name) (default 80 .Values.vllm.service.port | int) | quote }}{{ else if .Values.ovms.enabled }}{{ printf "http://%s:8300/v3" .Values.ovms.name | quote }}{{ else }}{{ .Values.pipelinemanager.env.LLM_SUMMARIZATION_API | quote }}{{ end }}
            - name: LLM_SUMMARIZATION_DEVICE
              value: "{{ if and .Values.ovms.enabled (not $useVllm) }}{{ $ovmsLlmDevice }}{{ else }}{{ .Values.pipelinemanager.env.LLM_SUMMARIZATION_DEVICE }}{{ end }}"
            - name: LLM_MODEL_NAME
              # Use storage model name for OVMS (includes device/format), raw name for vLLM
              value: {{ if $useVllm }}{{ required "Value for `.global.vlmName` is required!" .Values.global.vlmName | quote }}{{ else if .Values.ovms.enabled }}{{ $llmStorageName | quote }}{{ else }}{{ .Values.global.llmName | quote }}{{ end }}
            - name: VLM_CAPTIONING_KEY
              value: "{{ .Values.pipelinemanager.env.VLM_CAPTIONING_KEY }}"
            - name: VLM_CAPTIONING_API
              value: {{ if $useVllm }}{{ printf "http://%s:%d/v1" (default "cpu-vllm-service" .Values.vllm.service.name) (default 80 .Values.vllm.service.port | int) | quote }}{{ else if .Values.ovms.enabled }}{{ printf "http://%s:8300/v3" .Values.ovms.name | quote }}{{ else }}{{ .Values.pipelinemanager.env.VLM_CAPTIONING_API | quote }}{{ end }}
            - name: VLM_CAPTIONING_DEVICE
              value: "{{ if and .Values.ovms.enabled (not $useVllm) }}{{ $ovmsVlmDevice }}{{ else }}{{ .Values.pipelinemanager.env.VLM_CAPTIONING_DEVICE }}{{ end }}"
            - name: VLM_MODEL_NAME
              # Use storage model name for OVMS (includes device/format), raw name for vLLM
              value: {{ if $useVllm }}{{ required "Value for `.global.vlmName` is required!" .Values.global.vlmName | quote }}{{ else if .Values.ovms.enabled }}{{ $vlmStorageName | quote }}{{ else }}{{ required "Value for `.global.vlmName` is required!" .Values.global.vlmName | quote }}{{ end }}
            - name: LLM_CONCURRENT
              value: "{{ if and .Values.ovms.enabled (not $useVllm) $ovmsVlmUsesAccelerator }}1{{ else }}{{ .Values.pipelinemanager.env.LLM_CONCURRENT }}{{ end }}"
            - name: VLM_CONCURRENT
              value: "{{ if and .Values.ovms.enabled (not $useVllm) $ovmsVlmUsesAccelerator }}1{{ else }}{{ .Values.pipelinemanager.env.VLM_CONCURRENT }}{{ end }}"
            - name: TICK_INTERVAL_MS
              value: "{{ .Values.pipelinemanager.env.TICK_INTERVAL_MS }}"
            - name: FAST_TICK_INTERVAL_MS
              value: "{{ .Values.pipelinemanager.env.FAST_TICK_INTERVAL_MS }}"
            - name: SUMMARIZATION_MAX_COMPLETION_TOKENS
              value: "{{ .Values.pipelinemanager.env.SUMMARIZATION_MAX_COMPLETION_TOKENS }}"
            - name: CAPTIONING_MAX_COMPLETION_TOKENS
              value: "{{ .Values.pipelinemanager.env.CAPTIONING_MAX_COMPLETION_TOKENS }}"
            - name: MAX_CONTEXT_LENGTH
              value: "{{ .Values.pipelinemanager.env.MAX_CONTEXT_LENGTH }}"
            - name: LLM_MODEL_API
              value: "{{ .Values.pipelinemanager.env.LLM_MODEL_API }}"
            - name: VLM_MODEL_API
              value: "{{ .Values.pipelinemanager.env.VLM_MODEL_API }}"
            - name: MULTI_FRAME_COUNT
              value: "{{ if and .Values.ovms.enabled (not $useVllm) $ovmsVlmUsesAccelerator }}6{{ else }}{{ .Values.pipelinemanager.env.MULTI_FRAME_COUNT }}{{ end }}"
            - name: DB_HOST
              value: "{{ .Values.postgresql.name }}"
            - name: DB_PORT
              value: "{{ .Values.postgresql.service.port }}"
            - name: DB_USER
              value: {{ required "Value for POSTGRES_USER is required!" .Values.global.env.POSTGRES_USER | quote }}
            - name: DB_PASSWORD
              value: {{ required "Values for POSTGRES_PASSWORD is required!" .Values.global.env.POSTGRES_PASSWORD | quote }}
            - name: DB_NAME
              value: "{{ .Values.global.env.POSTGRES_DB }}"
            - name: AUDIO_HOST
              value: "http://{{ .Values.audioanalyzer.name }}:{{ .Values.audioanalyzer.service.port }}"
            - name: AUDIO_DEVICE
              value: "{{ .Values.pipelinemanager.env.AUDIO_DEVICE }}"
            - name: AUDIO_USE_FULL_TRANSCRIPT_SUMMARY
              value: "{{ .Values.pipelinemanager.env.AUDIO_USE_FULL_TRANSCRIPT_SUMMARY }}"
            - name: PRODUCE_FINAL_SUMMARY
              value: "{{ .Values.pipelinemanager.env.PRODUCE_FINAL_SUMMARY }}"
            - name: OTLP_TRACE_URL
              value: "{{ .Values.global.env.OTLP_ENDPOINT_TRACE }}"
            {{- if and .Values.vdmsdataprep.enabled .Values.vsscollector.enabled }}
            - name: DATAPREP_TELEMETRY_URL
              value: "http://{{ .Values.vdmsdataprep.name }}:{{ .Values.vdmsdataprep.service.port }}/v1/dataprep/telemetry?limit=1"
            {{- end }}
            {{- if and .Values.vdmsdataprep.enabled .Values.vsscollector.enabled }}
            - name: TELEMETRY_SIGNAL_DIR
              value: "/app/.collector-signals"
            {{- end }}
            - name: SUMMARY_FEATURE
              value: "{{ .Values.pipelinemanager.env.SUMMARY_FEATURE }}"
            - name: SEARCH_FEATURE
              value: "{{ .Values.pipelinemanager.env.SEARCH_FEATURE }}"
            {{- if .Values.videosearch.enabled }}
            - name: SEARCH_ENDPOINT
              value: "http://{{ .Values.videosearch.name }}:{{ .Values.videosearch.service.port }}"
            - name: SEARCH_DATAPREP_ENDPOINT
              value: "http://{{ .Values.vdmsdataprep.name }}:{{ .Values.vdmsdataprep.service.port }}"
            - name: SEARCH_DATAPREP_TIMEOUT_MS
              value: "{{ .Values.pipelinemanager.env.SEARCH_DATAPREP_TIMEOUT_MS }}"
            {{- end }}
            - name: USE_VLLM
              value: "{{ .Values.pipelinemanager.env.USE_VLLM }}"
          {{- if and .Values.vdmsdataprep.enabled .Values.vsscollector.enabled }}
          volumeMounts:
            - name: collector-signals
              mountPath: /app/.collector-signals
              subPath: {{ .Values.vsscollector.signalVolume.subPath | quote }}
          {{- end }}
      nodeSelector:
        {{- toYaml .Values.pipelinemanager.nodeSelector | nindent 8 }}
      {{- with .Values.pipelinemanager.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      tolerations:
        {{- toYaml .Values.pipelinemanager.tolerations | nindent 8 }}
      {{- if and .Values.vdmsdataprep.enabled .Values.vsscollector.enabled }}
      volumes:
        - name: collector-signals
          {{- if .Values.global.usePvc }}
          persistentVolumeClaim:
            claimName: {{ .Values.global.sharedPvcName | default "vss-pvc" }}
          {{- else if .Values.global.volumeHostPath }}
          hostPath:
            path: {{ .Values.global.volumeHostPath }}/collector-signals
            type: DirectoryOrCreate
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- end }}
