{{- if .Values.global.usePvc }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "vdms-dataprep.fullname" . }}-data-pvc
  {{- if .Values.global.keepPvc }}
  annotations:
    helm.sh/resource-policy: keep
  {{- end }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.modelPvc.size | default "10Gi" }}
  {{- if .Values.modelPvc.storageClassName }}
  storageClassName: {{ .Values.modelPvc.storageClassName }}
  {{- end }}
{{- end }}
