{{- $dpDevice := default "CPU" .Values.global.devices.vdmsDataprep.device -}}
{{- $dpKey := .Values.global.devices.vdmsDataprep.key -}}
{{- $dpUsesGpu := eq $dpDevice "GPU" -}}
{{- /* Validate: key required when device is GPU */ -}}
{{- if and $dpUsesGpu (not $dpKey) -}}
{{- fail "global.devices.vdmsDataprep.key is required when device is GPU" -}}
{{- end -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vdms-dataprep.fullname" . }}
  labels:
    {{- include "vdms-dataprep.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "vdms-dataprep.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "vdms-dataprep.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- if .Values.hostIPC }}
      hostIPC: true
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podAffinity }}
      affinity:
        podAffinity:
          {{- toYaml . | nindent 10 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          env:
            - name: APP_HOST
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['app.kubernetes.io/app']
          envFrom:
            - configMapRef:
                name: {{ include "vdms-dataprep.fullname" . }}-config
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ ternary .Values.image.tag .Values.global.commonTag (empty .Values.global.commonTag) | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: {{ .Values.containerPortName }}
              containerPort: {{ .Values.containerPort }}
              protocol: TCP
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          startupProbe:
            {{- toYaml .Values.startupProbe | nindent 12 }}
      {{- if $dpUsesGpu }}
          resources:
            requests:
              {{ $dpKey }}: 1
            limits:
              {{ $dpKey }}: 1
      {{- else if .Values.resources }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- end }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: volume-data
              mountPath: /home/appuser/.cache/huggingface
              subPath: huggingface
      {{- if .Values.modelPvc.enabled }}
            - name: models-data
              mountPath: /app/ov_models
              subPath: ovmodels
            - name: models-data
              mountPath: /app/models/yolox
              subPath: yoloxmodels
      {{- else }}
            - name: volume-data
              mountPath: /app/ov_models
              subPath: ovmodels
            - name: volume-data
              mountPath: /app/models/yolox
              subPath: yoloxmodels
      {{- end }}
            - name: volume-data
              mountPath: /tmp/dataprep
              subPath: tmpvideos
      volumes:
        - name: tmp
          emptyDir: {}
      {{- if $dpUsesGpu }}
        - name: dri-device
          hostPath:
            path: /dev/dri
            type: Directory
      {{- end }}
      {{- if .Values.modelPvc.enabled }}
        - name: models-data
          {{- if .Values.modelPvc.existingClaim }}
          persistentVolumeClaim:
            claimName: {{ .Values.modelPvc.existingClaim }}
          {{- else if .Values.global.usePvc }}
          persistentVolumeClaim:
            claimName: {{ include "vdms-dataprep.fullname" . }}-models-pvc
          {{- else if .Values.global.volumeHostPath }}
          hostPath:
            path: {{ .Values.global.volumeHostPath }}
            type: DirectoryOrCreate
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- end }}
        - name: volume-data
          {{- if .Values.global.usePvc }}
          persistentVolumeClaim:
            claimName: {{ .Values.global.sharedPvcName | default "vss-pvc" }}
          {{- else if .Values.global.volumeHostPath }}
          hostPath:
            path: {{ .Values.global.volumeHostPath }}
            type: DirectoryOrCreate
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
