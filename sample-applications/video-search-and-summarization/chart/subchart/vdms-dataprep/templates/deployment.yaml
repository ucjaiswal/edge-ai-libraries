{{- $embeddingDevice := .Values.embedding.embeddingDevice | default .Values.global.devices.vdmsDataprep.embedding.device | default .Values.embedding.vdmsDataprepDevice | default .Values.embedding.device | default "CPU" -}}
{{- $detectionDevice := .Values.frameProcessing.dataprepDetectionDevice | default .Values.global.devices.vdmsDataprep.detection.device | default .Values.embedding.vdmsDataprepDevice | default .Values.embedding.device | default "CPU" -}}
{{- $embeddingUsesGpu := eq $embeddingDevice "GPU" -}}
{{- $embeddingUsesNpu := eq $embeddingDevice "NPU" -}}
{{- $embeddingUsesAccelerator := or $embeddingUsesGpu $embeddingUsesNpu -}}
{{- $detectionUsesGpu := eq $detectionDevice "GPU" -}}
{{- $detectionUsesNpu := eq $detectionDevice "NPU" -}}
{{- $detectionUsesAccelerator := or $detectionUsesGpu $detectionUsesNpu -}}
{{- $dpUsesGpu := or $embeddingUsesGpu $detectionUsesGpu -}}
{{- $dpUsesNpu := or $embeddingUsesNpu $detectionUsesNpu -}}
{{- $dpUsesAccelerator := or $dpUsesGpu $dpUsesNpu -}}
{{- $embeddingKey := .Values.global.devices.vdmsDataprep.embedding.key -}}
{{- $detectionKey := .Values.global.devices.vdmsDataprep.detection.key -}}
{{- /* Validate: per-component key required when its device is GPU/NPU */ -}}
{{- if and $embeddingUsesAccelerator (not $embeddingKey) -}}
{{- fail "global.devices.vdmsDataprep.embedding.key is required when global.devices.vdmsDataprep.embedding.device is GPU or NPU" -}}
{{- end -}}
{{- if and $detectionUsesAccelerator (not $detectionKey) -}}
{{- fail "global.devices.vdmsDataprep.detection.key is required when global.devices.vdmsDataprep.detection.device is GPU or NPU" -}}
{{- end -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vdms-dataprep.fullname" . }}
  labels:
    {{- include "vdms-dataprep.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "vdms-dataprep.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "vdms-dataprep.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- if .Values.hostIPC }}
      hostIPC: true
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if or .Values.podSecurityContext $dpUsesAccelerator }}
      securityContext:
        {{- with .Values.podSecurityContext }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- if $dpUsesAccelerator }}
        supplementalGroups:
          {{- range .Values.global.accelGroupIds }}
          - {{ . }}
          {{- end }}
        {{- end }}
      {{- end }}
      {{- with .Values.podAffinity }}
      affinity:
        podAffinity:
          {{- toYaml . | nindent 10 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          env:
            - name: APP_HOST
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['app.kubernetes.io/app']
          envFrom:
            - configMapRef:
                name: {{ include "vdms-dataprep.fullname" . }}-config
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ include "vss.image" (dict "registry" .Values.global.registry "repository" .Values.image.repository "tag" (.Values.global.tag | default (ternary .Values.image.tag .Values.global.commonTag (empty .Values.global.commonTag) | default .Chart.AppVersion))) }}"
          imagePullPolicy: {{ .Values.global.pullPolicy | default .Values.image.pullPolicy }}
          ports:
            - name: {{ .Values.containerPortName }}
              containerPort: {{ .Values.containerPort }}
              protocol: TCP
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          startupProbe:
            {{- toYaml .Values.startupProbe | nindent 12 }}
      {{- if $dpUsesAccelerator }}
          resources:
            requests:
              {{- if $embeddingUsesAccelerator }}
              {{ $embeddingKey }}: 1
              {{- end }}
              {{- if and $detectionUsesAccelerator (or (not $embeddingUsesAccelerator) (ne $detectionKey $embeddingKey)) }}
              {{ $detectionKey }}: 1
              {{- end }}
            limits:
              {{- if $embeddingUsesAccelerator }}
              {{ $embeddingKey }}: 1
              {{- end }}
              {{- if and $detectionUsesAccelerator (or (not $embeddingUsesAccelerator) (ne $detectionKey $embeddingKey)) }}
              {{ $detectionKey }}: 1
              {{- end }}
      {{- else if .Values.resources }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- end }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: volume-data
              mountPath: /home/appuser/.cache/huggingface
              subPath: huggingface
      {{- if .Values.modelPvc.enabled }}
            - name: models-data
              mountPath: /app/ov_models
              subPath: ovmodels
            - name: models-data
              mountPath: /app/models/yolox
              subPath: yoloxmodels
      {{- else }}
            - name: volume-data
              mountPath: /app/ov_models
              subPath: ovmodels
            - name: volume-data
              mountPath: /app/models/yolox
              subPath: yoloxmodels
      {{- end }}
            - name: volume-data
              mountPath: /tmp/dataprep
              subPath: tmpvideos
      {{- if $dpUsesGpu }}
            - name: dri-device
              mountPath: /dev/dri
      {{- end }}
      {{- if $dpUsesNpu }}
            - name: accel-device
              mountPath: /dev/accel
      {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
      {{- if $dpUsesGpu }}
        - name: dri-device
          hostPath:
            path: /dev/dri
            type: Directory
      {{- end }}
      {{- if $dpUsesNpu }}
        - name: accel-device
          hostPath:
            path: /dev/accel
            type: Directory
      {{- end }}
      {{- if .Values.modelPvc.enabled }}
        - name: models-data
          {{- if .Values.modelPvc.existingClaim }}
          persistentVolumeClaim:
            claimName: {{ .Values.modelPvc.existingClaim }}
          {{- else if .Values.global.usePvc }}
          persistentVolumeClaim:
            claimName: {{ include "vdms-dataprep.fullname" . }}-models-pvc
          {{- else if .Values.global.volumeHostPath }}
          hostPath:
            path: {{ .Values.global.volumeHostPath }}
            type: DirectoryOrCreate
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- end }}
        - name: volume-data
          {{- if .Values.global.usePvc }}
          persistentVolumeClaim:
            claimName: {{ include "vdms-dataprep.fullname" . }}-data-pvc
          {{- else if .Values.global.volumeHostPath }}
          hostPath:
            path: {{ .Values.global.volumeHostPath }}
            type: DirectoryOrCreate
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
