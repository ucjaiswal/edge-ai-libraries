{{- $mmDevice := default "CPU" .Values.global.devices.multimodalEmbedding.device -}}
{{- $mmUsesGpu := eq $mmDevice "GPU" -}}
{{- $mmUsesNpu := eq $mmDevice "NPU" -}}
{{- $mmUsesAccelerator := or $mmUsesGpu $mmUsesNpu -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "multimodal-embedding-ms.fullname" . }}-config
  labels:
    {{- include "multimodal-embedding-ms.labels" . | nindent 4 }}
data:
  EMBEDDING_MODEL_NAME: {{ required "global.embeddingModelName is required" .Values.global.embeddingModelName | quote }}
  {{- if $mmUsesAccelerator }}
  EMBEDDING_DEVICE: {{ $mmDevice | quote }}
  EMBEDDING_USE_OV: "true"
  {{- else }}
  {{- $embeddingDevice := coalesce .Values.embeddingDevice $mmDevice "CPU" }}
  EMBEDDING_DEVICE: {{ $embeddingDevice | quote }}
  {{- if hasKey .Values "embeddingUseOV" }}
  EMBEDDING_USE_OV: {{ printf "%v" .Values.embeddingUseOV | quote }}
  {{- else if hasKey .Values.global.env "SDK_USE_OPENVINO" }}
  EMBEDDING_USE_OV: {{ printf "%v" .Values.global.env.SDK_USE_OPENVINO | quote }}
  {{- else }}
  EMBEDDING_USE_OV: "false"
  {{- end }}
  {{- end }}
  EMBEDDING_OV_MODELS_DIR: {{ .Values.embeddingOVModelsDir | default .Values.global.env.OV_MODELS_DIR | default "/app/ov_models" | quote }}
  DEFAULT_START_OFFSET_SEC: {{ .Values.defaultStartOffsetSec | quote }}
  DEFAULT_CLIP_DURATION: {{ .Values.defaultClipDuration | quote }}
  DEFAULT_NUM_FRAMES: {{ .Values.defaultNumFrames | quote }}
  INFER_BATCH_SIZE: {{ .Values.inferBatchSize | default .Values.global.env.INFER_BATCH_SIZE | default 32 | quote }}
  PREPROCESS_WORKERS: {{ .Values.preprocessWorkers | default .Values.global.env.PREPROCESS_WORKERS | default 8 | quote }}
  VIDEO_FRAME_BATCH_SIZE: {{ .Values.videoFrameBatchSize | default .Values.global.env.VIDEO_FRAME_BATCH_SIZE | default 64 | quote }}
  VIDEO_FRAME_QUEUE_SIZE: {{ .Values.videoFrameQueueSize | default .Values.global.env.VIDEO_FRAME_QUEUE_SIZE | default 32 | quote }}
  VIDEO_FRAME_SHM_POOL_BLOCK_SIZE: {{ .Values.videoFrameShmPoolBlockSize | default .Values.global.env.VIDEO_FRAME_SHM_POOL_BLOCK_SIZE | default 6220800 | int | quote }}
  VIDEO_FRAME_SHM_POOL_BLOCKS_MULTIPLIER: {{ .Values.videoFrameShmPoolBlocksMultiplier | default .Values.global.env.VIDEO_FRAME_SHM_POOL_BLOCKS_MULTIPLIER | default 2 | quote }}
  VIDEO_FRAME_LOG_LEVEL: {{ .Values.videoFrameLogLevel | default .Values.global.env.VIDEO_FRAME_LOG_LEVEL | default "INFO" | quote }}
  OV_PERFORMANCE_MODE: {{ .Values.ovPerformanceMode | default .Values.global.env.OV_PERFORMANCE_MODE | default "THROUGHPUT" | quote }}
  HF_HOME: "/home/appuser/.cache/huggingface"
  TRANSFORMERS_CACHE: "/home/appuser/.cache/huggingface"
  HUGGINGFACE_HUB_CACHE: "/home/appuser/.cache/huggingface"
  XDG_CACHE_HOME: "/home/appuser/.cache"
  # Persist the OpenVINO compiled-model cache on the (writable, persistent) ov_models
  # volume so GPU/NPU graph compilation runs once instead of on every pod start.
  OV_CACHE_DIR: {{ .Values.ovCacheDir | default "/app/ov_models/ov_cache" | quote }}
  http_proxy: {{ .Values.global.proxy.http_proxy | quote }}
  https_proxy: {{ .Values.global.proxy.https_proxy | quote }}
  no_proxy: "{{ .Values.global.proxy.no_proxy }},audioanalyzer,pipelinemanager,videoingestion,minio-server,postgresql,video-summary-nginx,rabbitmq,multimodal-embedding-ms,vdms-dataprep,vdms-vectordb,videosearch"
  no_proxy_env: {{ .Values.global.proxy.no_proxy | quote }}
