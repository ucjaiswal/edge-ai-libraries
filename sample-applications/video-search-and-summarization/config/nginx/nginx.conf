# Nginx configuration for video-search-and-summarization service
# IMPORTANT: Do not add environment variables here, as they will not be resolved. 
# If it is compulsory to use env vars, then use templates. Mount them to templates directory
# and include them as an additional conf here.
events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    server {
        listen 80;
        listen [::]:80;
        client_max_body_size 500M;
        proxy_read_timeout 1800s;
        proxy_connect_timeout 300s;
        proxy_send_timeout 1800s;
        send_timeout 1800s;
        keepalive_timeout 1800s;

        # Including additional config for routing to appropriate UIs based on deployment configuration. 
        # eg: for --summary mode routing config for single UI loaded, for --dual mode config for dual UI loaded.
        # CAUTION: Do not change this file reference unless you know what you are doing.
        include nginx_ui.conf;

        location /ws/ {
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Host $host;

            proxy_pass "http://pipeline-manager:3000/ws/";

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        location /manager/ {
            proxy_pass "http://pipeline-manager:3000/";
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # Telemetry WebSocket fan-out served by Pipeline Manager
        location /manager/metrics/ws/ {
            proxy_pass "http://pipeline-manager:3000/metrics/ws/";
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;
        }

        # OVMS Prometheus metrics endpoint
        # Use variable-based proxy_pass so nginx does not resolve the upstream
        # at startup; this allows the service to be absent in search-only mode.
        location /ovms/metrics {
            resolver 127.0.0.11 valid=30s;
            set $ovms_upstream "http://ovms-service/metrics";
            proxy_pass $ovms_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /datastore/ {
            proxy_pass "http://minio-service/";
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
        
    }
}
