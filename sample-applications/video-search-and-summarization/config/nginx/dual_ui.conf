location /summary/ {
    proxy_pass "http://vss-summary-ui:8080/";   # Note: /summary/ prefix is replaced by / in the upstream.
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "Upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
}

location = /summary {
    return 301 $scheme://$http_host/summary/;
}

# Default URL without any URI will be redirected to Summary UI.
location = / {
    return 301 $scheme://$http_host/summary/;
}

location /search/ {
    proxy_pass "http://vss-search-ui:8080/";    # Note: /search/ prefix is replaced by / in upstream.
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "Upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
}

location = /search {
    return 301 $scheme://$http_host/search/;
}