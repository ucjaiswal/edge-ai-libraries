openapi: 3.1.0
info:
  title: Intel GenAI Multimodal DataPrep Microservice (VDMS Based)
  description: A microservice for data preparation from text, video and image sources
  version: 0.1.0
paths:
  /health:
    get:
      tags:
      - Status APIs
      summary: Check service health
      description: Health API endpoint to check whether API Server is reachable and responding.
      operationId: getServiceHealth
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /summary:
    post:
      tags:
      - Document Processing APIs
      summary: Process summary text with video timestamp references for embedding generation.
      description: "### Process summary text for a video with video timestamp references for embedding generation.\n\nThis\
        \ endpoint takes a summary text and video timestamp references, validates that the video exists,\nand stores the text\
        \ embedding in the VDMS vector database with the associated video metadata.\n\n#### Body Params:\n   - **bucket_name\
        \ (str) :** The bucket name where the referenced video is stored\n   - **video_id (str) :** The video ID (directory)\
        \ containing the referenced video\n   - **video_summary (str) :** The text summary for the video to be embedded\n\
        \   - **video_start_time (float) :** The start timestamp in seconds for the video or video chunk\n   - **video_end_time\
        \ (float) :** The end timestamp in seconds for the video or video chunk\n   - **tags (list(str), optional) :** A list\
        \ of tags to be associated with the video. Useful for filtering the search.\n   \n#### Raises:\n- **400 Bad Request\
        \ :** If required parameters are missing or invalid.\n- **404 Not Found :** If the specified video cannot be found\
        \ in Minio.\n- **502 Bad Gateway :** When something unpleasant happens at Minio storage.\n- **500 Internal Server\
        \ Error :** When some internal error occurs at DataPrep API server.\n\nReturns:\n- **response (json) :** A response\
        \ JSON containing status and message."
      operationId: createVideoSummaryEmbedding
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VideoSummaryRequest'
              description: Document processing parameters
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataPrepResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /videos/minio:
    post:
      tags:
      - Video Processing APIs
      summary: Process video from Minio storage for embedding generation.
      description: "### Processes videos stored in Minio using frame-based processing with optional object detection.\n\n\
        Video is processed by extracting individual frames at regular intervals (every Nth frame).\nEach frame generates its\
        \ own embedding. When object detection is enabled, detected objects\nare cropped and embedded as separate entities,\
        \ providing enhanced semantic coverage.\n\n***For example:** Given a video of 30s at 30fps (900 frames total), with\
        \ frame_interval = 15,\n60 frames will be extracted and embedded (every 15th frame). If object detection is enabled\n\
        and 3 objects are detected per frame on average, this results in approximately 240 embeddings\n(60 frames + 180 object\
        \ crops).**\n\n#### Body Params:\n- **video_request (VideoRequest) :** Contains processing parameters:\n   - **bucket_name\
        \ (str) :** The bucket name where the video is stored (If not provided, a default bucket name will be used based on\
        \ application config.)\n   - **video_id (str) :** The video ID (directory) containing the video (required)\n   - **video_name\
        \ (str, optional) :** The video filename within the video_id directory (if omitted, the first MP4 video found in the\
        \ directory will be used automatically)\n   - **frame_interval (int) :** Extract every Nth frame for processing (default:\
        \ 15, range: 1-60)\n   - **enable_object_detection (bool) :** Enable object detection and crop extraction (default:\
        \ True)\n   - **detection_confidence (float) :** Confidence threshold for object detection (default: 0.85, range:\
        \ 0.1-1.0)\n   - **tags (list(str), optional) :** A list of tags to be associated with the video. Useful for filtering\
        \ the search.\n\n#### Raises:\n- **400 Bad Request :** If required parameters are missing or invalid.\n- **404 Not\
        \ Found :** If the specified video cannot be found in Minio or no videos exist in the specified directory.\n- **502\
        \ Bad Gateway :** When something unpleasant happens at Minio storage.\n- **500 Internal Server Error :** When some\
        \ internal error occurs at DataPrep API server.\n\nReturns:\n- **response (json) :** A response JSON containing status\
        \ and message."
      operationId: processVideoFromMinio
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VideoRequest'
              description: Video processing parameters
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataPrepResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /videos/upload:
    post:
      tags:
      - Video Processing APIs
      summary: Upload and process a video file for embedding generation.
      description: '### Upload and process a video file for frame-based embedding generation.


        This endpoint accepts an MP4 video file upload, stores it in Minio, and generates embeddings

        using frame-based processing with optional object detection.


        Video is processed by extracting individual frames at regular intervals (every Nth frame).

        Each frame generates its own embedding. When object detection is enabled, detected objects

        are cropped and embedded as separate entities, providing enhanced semantic coverage.


        ***For example:** Given a video of 30s at 30fps (900 frames total), with frame_interval = 15,

        60 frames will be extracted and embedded (every 15th frame). If object detection is enabled

        and suppose 3 objects are detected per frame on average, this results in approximately 240 embeddings

        (60 frames + 180 object crops).**


        #### File Upload:

        - **file (UploadFile, required) :** Video file to upload (MP4 format only, max size 500MB)


        #### Query Params:

        - **bucket_name (str, optional) :** The bucket name to store the video in. If not provided, default bucket will be
        used.

        - **frame_interval (int, optional) :** Extract every Nth frame for processing (default: 15, range: 1-60)

        - **enable_object_detection (bool, optional) :** Enable object detection and crop extraction (default: True)

        - **detection_confidence (float, optional) :** Confidence threshold for object detection (default: 0.85, range: 0.1-1.0)

        - **tags (list(str), optional) :** A list of tags to be associated with the video. Useful for filtering the search.


        #### Raises:

        - **400 Bad Request :** If the video file is not an MP4 or fails validation.

        - **413 Request Entity Too Large :** If the uploaded file exceeds the 500MB limit.

        - **502 Bad Gateway :** When something unpleasant happens at Minio storage.

        - **500 Internal Server Error :** When some internal error occurs at DataPrep API server.


        Returns:

        - **response (json) :** A response JSON containing status and message.'
      operationId: uploadAndProcessVideo
      parameters:
      - name: bucket_name
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: The bucket name to store the video in. If not provided, default bucket will be used.
          title: Bucket Name
        description: The bucket name to store the video in. If not provided, default bucket will be used.
      - name: frame_interval
        in: query
        required: false
        schema:
          anyOf:
          - type: integer
            maximum: 60
            minimum: 1
          - type: 'null'
          description: 'Extract every Nth frame for processing (default: 15)'
          title: Frame Interval
        description: 'Extract every Nth frame for processing (default: 15)'
      - name: enable_object_detection
        in: query
        required: false
        schema:
          anyOf:
          - type: boolean
          - type: 'null'
          description: 'Enable object detection and crop extraction (default: True)'
          title: Enable Object Detection
        description: 'Enable object detection and crop extraction (default: True)'
      - name: detection_confidence
        in: query
        required: false
        schema:
          anyOf:
          - type: number
            maximum: 1.0
            minimum: 0.1
          - type: 'null'
          description: 'Confidence threshold for object detection (default: 0.85)'
          title: Detection Confidence
        description: 'Confidence threshold for object detection (default: 0.85)'
      - name: tags
        in: query
        required: false
        schema:
          anyOf:
          - type: array
            items:
              type: string
          - type: 'null'
          description: List of tags to be associated with the video. Useful for filtering the search.
          title: Tags
        description: List of tags to be associated with the video. Useful for filtering the search.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Body_uploadAndProcessVideo'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataPrepResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /videos/rtsp:
    post:
      tags:
      - Video Processing APIs
      summary: Provide list of RTSP Stream URLs to process and generate embeddings.
      description: '### Process RTSP stream URLs for frame-based embedding generation.


        This endpoint accepts a list of RTSP stream URLs, validates them, and generates embeddings

        using frame-based processing with optional object detection.


        Each RTSP stream is processed by extracting individual frames at regular intervals (every Nth frame).

        Each frame generates its own embedding. When object detection is enabled and suppose 3 objects are detected per frame
        on average, this results in approximately 240 embeddings

        (60 frames + 180 object crops) per video. The generated embeddings are stored in the vector database with associated
        metadata and tags.


        #### Query Params:

        - **rtsp_urls (list(str), required) :** List of RTSP stream URLs to process. Each URL will be validated and processed
        for embedding generation.

        - **frame_interval (int, optional) :** Extract every Nth frame for processing (default: 15, range: 1-60)

        - **enable_object_detection (bool, optional) :** Enable object detection and crop extraction (default: True)

        - **detection_confidence (float, optional) :** Confidence threshold for object detection (default: 0.85, range: 0.1-1.0)

        - **tags (list(str), optional) :** A list of tags to be associated with the videos. Useful for filtering the search.


        #### Raises:

        - **400 Bad Request :** If any of the RTSP URLs are invalid or fail validation.

        - **502 Bad Gateway :** When something unpleasant happens at Minio storage or during stream access.

        - **500 Internal Server Error :** When some internal error occurs at DataPrep API server.


        Returns:

        - **response (json) :** A response JSON containing status and message.'
      operationId: processRtspStreams
      parameters:
      - name: rtsp_urls
        in: query
        required: true
        schema:
          type: array
          items:
            type: string
          description: List of RTSP stream URLs to process. Each URL will be validated and processed for embedding generation.
          title: Rtsp Urls
        description: List of RTSP stream URLs to process. Each URL will be validated and processed for embedding generation.
      - name: frame_interval
        in: query
        required: false
        schema:
          anyOf:
          - type: integer
            maximum: 60
            minimum: 1
          - type: 'null'
          description: 'Extract every Nth frame for processing (default: 15)'
          title: Frame Interval
        description: 'Extract every Nth frame for processing (default: 15)'
      - name: enable_object_detection
        in: query
        required: false
        schema:
          anyOf:
          - type: boolean
          - type: 'null'
          description: 'Enable object detection and crop extraction (default: True)'
          title: Enable Object Detection
        description: 'Enable object detection and crop extraction (default: True)'
      - name: detection_confidence
        in: query
        required: false
        schema:
          anyOf:
          - type: number
            maximum: 1.0
            minimum: 0.1
          - type: 'null'
          description: 'Confidence threshold for object detection (default: 0.85)'
          title: Detection Confidence
        description: 'Confidence threshold for object detection (default: 0.85)'
      - name: tags
        in: query
        required: false
        schema:
          anyOf:
          - type: array
            items:
              type: string
          - type: 'null'
          description: List of tags to be associated with the videos. Useful for filtering the search.
          title: Tags
        description: List of tags to be associated with the videos. Useful for filtering the search.
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataPrepResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /telemetry:
    get:
      tags:
      - Telemetry
      summary: Get recent telemetry records
      description: Return the most recent telemetry entries (newest first).
      operationId: listTelemetryRecords
      parameters:
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 100
          minimum: 1
          description: Maximum number of latest telemetry records to return.
          default: 100
          title: Limit
        description: Maximum number of latest telemetry records to return.
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TelemetryResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /videos:
    get:
      tags:
      - Video Management APIs
      summary: Get list of videos from Minio storage.
      description: '### Get list of videos from Minio storage.


        This endpoint retrieves a list of all videos stored in Minio and returns their information.


        #### Query Params:

        - **bucket_name (str, optional) :** The bucket name where videos are stored. If not provided, default bucket will
        be used.


        #### Raises:

        - **502 Bad Gateway :** When something unpleasant happens at Minio storage.

        - **500 Internal Server Error :** When some internal error occurs at DataPrep API server.


        Returns:

        - **response (json) :** A response JSON containing list of videos with their information.'
      operationId: listVideos
      parameters:
      - name: bucket_name
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: The bucket name where videos are stored. If not provided, default bucket will be used.
          title: Bucket Name
        description: The bucket name where videos are stored. If not provided, default bucket will be used.
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BucketVideoListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /videos/download:
    get:
      tags:
      - Video Management APIs
      summary: Download a video from Minio storage.
      description: '### Download a video from Minio storage.


        This endpoint retrieves a video from Minio storage and returns it as a stream.


        #### Query Params:

        - **video_id (str, required) :** The video ID (directory) containing the video to download

        - **bucket_name (str, optional) :** The bucket name where the video is stored. If not provided, default bucket will
        be used.

        - **video_name (str, optional) :** The video filename to download. If not provided, the first video in the directory
        will be used.

        - **download (bool, optional) :** Set to true to download the file instead of streaming it


        #### Raises:

        - **400 Bad Request :** If required parameters are missing or invalid.

        - **404 Not Found :** If the specified video cannot be found in Minio or no videos exist in the specified directory.

        - **502 Bad Gateway :** When something unpleasant happens at Minio storage.

        - **500 Internal Server Error :** When some internal error occurs at DataPrep API server.


        Returns:

        - **response (stream) :** The video file as a stream.'
      operationId: downloadVideo
      parameters:
      - name: video_id
        in: query
        required: true
        schema:
          type: string
          description: The video ID (directory) containing the video to download
          title: Video Id
        description: The video ID (directory) containing the video to download
      - name: bucket_name
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: The bucket name where the video is stored. If not provided, default bucket will be used.
          title: Bucket Name
        description: The bucket name where the video is stored. If not provided, default bucket will be used.
      - name: video_name
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: The video filename to download. If not provided, the first video in the directory will be used.
          title: Video Name
        description: The video filename to download. If not provided, the first video in the directory will be used.
      - name: download
        in: query
        required: false
        schema:
          type: boolean
          description: Set to true to download the file instead of streaming it
          default: false
          title: Download
        description: Set to true to download the file instead of streaming it
      responses:
        '200':
          description: Video stream response
          content:
            video/mp4:
              schema:
                type: string
                format: binary
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /videos/{bucket_name}/{video_id}:
    delete:
      tags:
      - Video Management APIs
      summary: Delete a video from Minio storage.
      description: '### Delete a video from Minio storage.


        This endpoint deletes a video or all videos in a directory from Minio storage.


        #### Path Params:

        - **bucket_name (str, required) :** The bucket name where the video is stored

        - **video_id (str, required) :** The video ID (directory) containing the video to delete


        #### Query Params:

        - **video_name (str, optional) :** The video filename to delete. If not provided, all videos in the directory will
        be deleted.


        #### Raises:

        - **400 Bad Request :** If required parameters are missing or invalid.

        - **404 Not Found :** If the specified video cannot be found in Minio or no videos exist in the specified directory.

        - **502 Bad Gateway :** When something unpleasant happens at Minio storage.

        - **500 Internal Server Error :** When some internal error occurs at DataPrep API server.


        Returns:

        - **response (json) :** A response JSON containing status and message.'
      operationId: deleteVideo
      parameters:
      - name: bucket_name
        in: path
        required: true
        schema:
          type: string
          description: The bucket name where the video is stored
          title: Bucket Name
        description: The bucket name where the video is stored
      - name: video_id
        in: path
        required: true
        schema:
          type: string
          description: The video ID (directory) containing the video to delete
          title: Video Id
        description: The video ID (directory) containing the video to delete
      - name: video_name
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: The video filename to delete. If not provided, all videos in the directory will be deleted.
          title: Video Name
        description: The video filename to delete. If not provided, all videos in the directory will be deleted.
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataPrepResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
components:
  schemas:
    Body_uploadAndProcessVideo:
      properties:
        file:
          type: string
          contentMediaType: application/octet-stream
          title: File
          description: Video file to upload (MP4 format only)
      type: object
      required:
      - file
      title: Body_uploadAndProcessVideo
    BucketVideoListResponse:
      properties:
        status:
          $ref: '#/components/schemas/StatusEnum'
          default: success
        message:
          anyOf:
          - type: string
          - type: 'null'
          title: Message
        bucket_name:
          type: string
          title: Bucket Name
        videos:
          items:
            $ref: '#/components/schemas/VideoInfo'
          type: array
          title: Videos
          description: List of video information objects containing video details
      type: object
      required:
      - bucket_name
      title: BucketVideoListResponse
      description: Response model for list of videos in a bucket
    DataPrepResponse:
      properties:
        status:
          $ref: '#/components/schemas/StatusEnum'
          default: success
        message:
          anyOf:
          - type: string
          - type: 'null'
          title: Message
      type: object
      title: DataPrepResponse
      description: Response model for API Responses from DataStore service
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    HealthResponse:
      properties:
        status:
          type: string
          title: Status
        embedding_mode:
          type: string
          title: Embedding Mode
        sdk_client_status:
          anyOf:
          - type: string
          - type: 'null'
          title: Sdk Client Status
        model_name:
          anyOf:
          - type: string
          - type: 'null'
          title: Model Name
        embedding_device:
          anyOf:
          - type: string
          - type: 'null'
          title: Embedding Device
        sdk_use_openvino:
          anyOf:
          - type: boolean
          - type: 'null'
          title: Sdk Use Openvino
        sdk_client_error:
          anyOf:
          - type: string
          - type: 'null'
          title: Sdk Client Error
        detection_model:
          anyOf:
          - type: string
          - type: 'null'
          title: Detection Model
        detection_device:
          anyOf:
          - type: string
          - type: 'null'
          title: Detection Device
      type: object
      required:
      - status
      - embedding_mode
      title: HealthResponse
      description: Response model for service health checks.
    StatusEnum:
      type: string
      enum:
      - success
      - error
      title: StatusEnum
    TelemetryBatchDetail:
      properties:
        stream_id:
          type: integer
          minimum: 0.0
          title: Stream Id
        batch_index:
          type: integer
          minimum: 0.0
          title: Batch Index
        input_frames:
          type: integer
          minimum: 0.0
          title: Input Frames
        items_after_detection:
          type: integer
          minimum: 0.0
          title: Items After Detection
        detection_seconds:
          type: number
          minimum: 0.0
          title: Detection Seconds
        embedding_seconds:
          type: number
          minimum: 0.0
          title: Embedding Seconds
        embedding_infer_seconds:
          type: number
          minimum: 0.0
          title: Embedding Infer Seconds
        storage_seconds:
          type: number
          minimum: 0.0
          title: Storage Seconds
        total_seconds:
          type: number
          minimum: 0.0
          title: Total Seconds
        embeddings_stored:
          type: integer
          minimum: 0.0
          title: Embeddings Stored
      type: object
      required:
      - stream_id
      - batch_index
      - input_frames
      - items_after_detection
      - detection_seconds
      - embedding_seconds
      - embedding_infer_seconds
      - storage_seconds
      - total_seconds
      - embeddings_stored
      title: TelemetryBatchDetail
      description: Timing details for a single batch in SDK mode.
    TelemetryCounts:
      properties:
        stream_id:
          type: integer
          minimum: 0.0
          title: Stream Id
        frames_extracted:
          type: integer
          minimum: 0.0
          title: Frames Extracted
        items_after_detection:
          type: integer
          minimum: 0.0
          title: Items After Detection
        embeddings_stored:
          type: integer
          minimum: 0.0
          title: Embeddings Stored
      type: object
      required:
      - stream_id
      - frames_extracted
      - items_after_detection
      - embeddings_stored
      title: TelemetryCounts
      description: Aggregate frame and embedding counts.
    TelemetryProcessingConfig:
      properties:
        embedding_mode:
          type: string
          title: Embedding Mode
        object_detection_enabled:
          type: boolean
          title: Object Detection Enabled
        detection_confidence:
          anyOf:
          - type: number
          - type: 'null'
          title: Detection Confidence
        sdk_parallel_workers:
          anyOf:
          - type: integer
          - type: 'null'
          title: Sdk Parallel Workers
        sdk_batch_size:
          anyOf:
          - type: integer
          - type: 'null'
          title: Sdk Batch Size
      type: object
      required:
      - embedding_mode
      - object_detection_enabled
      title: TelemetryProcessingConfig
      description: Processing configuration persisted with telemetry.
    TelemetryRecord:
      properties:
        request_id:
          type: string
          title: Request Id
        source:
          type: string
          title: Source
        processing_mode:
          type: string
          title: Processing Mode
        timestamps:
          $ref: '#/components/schemas/TelemetryTimestamps'
        video:
          $ref: '#/components/schemas/TelemetryVideoMetadata'
        config:
          $ref: '#/components/schemas/TelemetryProcessingConfig'
        counts:
          $ref: '#/components/schemas/TelemetryCounts'
        pipeline_stats:
          additionalProperties: true
          type: object
          title: Pipeline Stats
        stage_duration:
          additionalProperties: true
          type: object
          title: Stage Duration
        stage_throughput:
          additionalProperties: true
          type: object
          title: Stage Throughput
        batches:
          items:
            $ref: '#/components/schemas/TelemetryBatchDetail'
          type: array
          title: Batches
      type: object
      required:
      - request_id
      - source
      - processing_mode
      - timestamps
      - video
      - config
      - counts
      title: TelemetryRecord
      description: Stored telemetry entry served via /telemetry endpoint.
    TelemetryResponse:
      properties:
        count:
          type: integer
          title: Count
        items:
          items:
            $ref: '#/components/schemas/TelemetryRecord'
          type: array
          title: Items
      type: object
      required:
      - count
      - items
      title: TelemetryResponse
      description: Response payload for /telemetry endpoint.
