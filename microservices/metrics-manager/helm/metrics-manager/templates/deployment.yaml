{{- $kind := .Values.controller.kind | default "Deployment" -}}
apiVersion: apps/v1
kind: {{ $kind }}
metadata:
  name: {{ include "metrics-manager.fullname" . }}
  labels:
    {{- include "metrics-manager.labels" . | nindent 4 }}
spec:
  {{- if eq $kind "Deployment" }}
  replicas: {{ .Values.controller.replicaCount }}
  strategy:
    type: Recreate
  {{- end }}
  selector:
    matchLabels:
      {{- include "metrics-manager.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "metrics-manager.labels" . | nindent 8 }}
        {{- with .Values.pod.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        {{- if .Values.telegraf.config }}
        # Roll the pod when the bundled telegraf.conf changes.
        checksum/telegraf-config: {{ include (print $.Template.BasePath "/configmap-telegraf.yaml") . | sha256sum }}
        {{- end }}
        {{- /*
          Legacy AppArmor annotation - emitted on Kubernetes < 1.30 when
          the user provided an appArmorProfile but the native field is
          unsupported. Harmless on newer clusters (ignored in favour of the
          field), but only emit it where it is actually needed.
        */ -}}
        {{- $kubeMinorAnn := .Capabilities.KubeVersion.Minor | replace "+" "" | int }}
        {{- $kubeMajorAnn := .Capabilities.KubeVersion.Major | replace "+" "" | int }}
        {{- $apparmorNativeAnn := or (.Values.securityContext.appArmorProfileForce) (and (ge $kubeMajorAnn 1) (ge $kubeMinorAnn 30)) }}
        {{- if and .Values.securityContext.appArmorProfile (not $apparmorNativeAnn) }}
        {{- $type := .Values.securityContext.appArmorProfile.type | default "" }}
        {{- if eq $type "Unconfined" }}
        container.apparmor.security.beta.kubernetes.io/metrics-manager: unconfined
        {{- else if eq $type "RuntimeDefault" }}
        container.apparmor.security.beta.kubernetes.io/metrics-manager: runtime/default
        {{- else if eq $type "Localhost" }}
        container.apparmor.security.beta.kubernetes.io/metrics-manager: localhost/{{ .Values.securityContext.appArmorProfile.localhostProfile }}
        {{- end }}
        {{- end }}
        {{- with .Values.pod.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "metrics-manager.serviceAccountName" . }}
      hostPID: {{ .Values.pod.hostPID }}
      hostNetwork: {{ .Values.pod.hostNetwork }}
      {{- /*
        dnsPolicy:
          - explicit value wins
          - hostNetwork=true requires ClusterFirstWithHostNet (the API server
            rejects ClusterFirst in that combination), so default it here
          - otherwise fall back to ClusterFirst
      */ -}}
      {{- $dnsPolicy := .Values.pod.dnsPolicy }}
      {{- if not $dnsPolicy }}
        {{- if .Values.pod.hostNetwork }}
          {{- $dnsPolicy = "ClusterFirstWithHostNet" }}
        {{- else }}
          {{- $dnsPolicy = "ClusterFirst" }}
        {{- end }}
      {{- end }}
      dnsPolicy: {{ $dnsPolicy }}
      restartPolicy: {{ .Values.pod.restartPolicy }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.pod.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      {{- /* Scheduling constraints apply to both Deployment and DaemonSet. */ -}}
      {{- with .Values.controller.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controller.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controller.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: metrics-manager
          image: {{ include "metrics-manager.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            privileged: {{ .Values.securityContext.privileged }}
            runAsNonRoot: {{ .Values.securityContext.runAsNonRoot }}
            readOnlyRootFilesystem: {{ .Values.securityContext.readOnlyRootFilesystem }}
            {{- /*
              appArmorProfile is a native field starting with Kubernetes
              1.30. On older API servers it is silently dropped or rejected,
              so render it only when:
                * the value is set, AND
                * the cluster reports >= 1.30 (or the user opts in via
                  securityContext.appArmorProfileForce=true).
              For older clusters we fall back to the legacy pod annotation
              `container.apparmor.security.beta.kubernetes.io/<container>`
              emitted in metadata above.
            */ -}}
            {{- $kubeMinor := .Capabilities.KubeVersion.Minor | replace "+" "" | int }}
            {{- $kubeMajor := .Capabilities.KubeVersion.Major | replace "+" "" | int }}
            {{- $apparmorNative := or (.Values.securityContext.appArmorProfileForce) (and (ge $kubeMajor 1) (ge $kubeMinor 30)) }}
            {{- if and .Values.securityContext.appArmorProfile $apparmorNative }}
            appArmorProfile:
              {{- toYaml .Values.securityContext.appArmorProfile | nindent 14 }}
            {{- end }}
            {{- with .Values.securityContext.seccompProfile }}
            seccompProfile:
              {{- toYaml . | nindent 14 }}
            {{- end }}
          ports:
            - name: metrics
              containerPort: {{ .Values.service.metricsPort }}
              protocol: TCP
            - name: telegraf
              containerPort: {{ .Values.service.telegrafPort }}
              protocol: TCP
            - name: telegraf-http
              containerPort: {{ .Values.service.telegrafHttpPort }}
              protocol: TCP
          env:
            - name: METRICS_PORT
              value: {{ .Values.service.metricsPort | quote }}
            - name: TELEGRAF_PORT
              value: {{ .Values.service.telegrafPort | quote }}
            - name: TELEGRAF_HTTP_PORT
              value: {{ .Values.service.telegrafHttpPort | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.config.logLevel | quote }}
            - name: LOG_FORMAT
              value: {{ .Values.config.logFormat | quote }}
            - name: CORS_ORIGINS
              value: {{ .Values.config.corsOrigins | quote }}
            - name: METRICS_RETENTION_SECONDS
              value: {{ .Values.config.metricsRetentionSeconds | quote }}
            - name: MAX_METRICS_BATCH_SIZE
              value: {{ .Values.config.maxMetricsBatchSize | quote }}
            - name: METRICS_MANAGER_HOSTNAME
              value: {{ .Values.config.hostnameOverride | quote }}
            - name: CUSTOM_METRICS_DIR
              value: /app/custom-metrics
            - name: TELEGRAF_CONFIG_PATH
              value: /etc/telegraf/telegraf.conf
            {{- with .Values.config.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: sys
              mountPath: /sys
              readOnly: true
            - name: run
              mountPath: /run
              readOnly: true
            {{- if .Values.hardware.gpu.enabled }}
            - name: dev-dri
              mountPath: /dev/dri
            {{- end }}
            {{- if .Values.telegraf.config }}
            - name: telegraf-config
              mountPath: /etc/telegraf/telegraf.conf
              subPath: telegraf.conf
              readOnly: true
            {{- end }}
            {{- if and .Values.customMetrics.enabled (ne .Values.customMetrics.storage "none") }}
            - name: custom-metrics
              mountPath: /app/custom-metrics
            {{- end }}
      volumes:
        - name: sys
          hostPath:
            path: /sys
            type: Directory
        - name: run
          hostPath:
            path: /run
            type: Directory
        {{- if .Values.hardware.gpu.enabled }}
        - name: dev-dri
          hostPath:
            path: /dev/dri
        {{- end }}
        {{- if .Values.telegraf.config }}
        - name: telegraf-config
          configMap:
            name: {{ include "metrics-manager.fullname" . }}-telegraf
        {{- end }}
        {{- if and .Values.customMetrics.enabled (ne .Values.customMetrics.storage "none") }}
        - name: custom-metrics
          {{- if eq .Values.customMetrics.storage "pvc" }}
          persistentVolumeClaim:
            claimName: {{ default (printf "%s-custom-metrics" (include "metrics-manager.fullname" .)) .Values.customMetrics.existingClaim }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- end }}
