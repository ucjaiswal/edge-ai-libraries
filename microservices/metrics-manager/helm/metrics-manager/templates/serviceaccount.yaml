{{- if .Values.pod.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "metrics-manager.serviceAccountName" . }}
  labels:
    {{- include "metrics-manager.labels" . | nindent 4 }}
  {{- with .Values.pod.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
