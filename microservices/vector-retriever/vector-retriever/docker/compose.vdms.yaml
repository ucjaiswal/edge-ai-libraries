services:
  multimodal-embedding-serving:
    image: intel/multimodal-embedding-serving:latest
    container_name: multimodal-embedding-serving
    ports:
      - '${EMBEDDING_SERVER_PORT:-9777}:8000'
    environment:
      no_proxy: ${no_proxy:-},${MULTIMODAL_EMBEDDING_HOST:-multimodal-embedding-serving},localhost
      NO_PROXY: ${no_proxy:-},${MULTIMODAL_EMBEDDING_HOST:-multimodal-embedding-serving},localhost
      no_proxy_env: ${no_proxy:-},${MULTIMODAL_EMBEDDING_HOST:-multimodal-embedding-serving},localhost
      http_proxy: ${http_proxy:-}
      https_proxy: ${https_proxy:-}
      EMBEDDING_MODEL_NAME: ${EMBEDDING_MODEL_NAME:-}
      EMBEDDING_DEVICE: ${EMBEDDING_DEVICE:-CPU}
      EMBEDDING_USE_OV: ${EMBEDDING_USE_OV:-true}
      EMBEDDING_OV_MODELS_DIR: ${EMBEDDING_OV_MODELS_DIR:-/app/ov_models}
      DEFAULT_START_OFFSET_SEC: ${DEFAULT_START_OFFSET_SEC:-0}
      DEFAULT_CLIP_DURATION: ${DEFAULT_CLIP_DURATION:--1}
      DEFAULT_NUM_FRAMES: ${DEFAULT_NUM_FRAMES:-64}
      OV_PERFORMANCE_MODE: ${OV_PERFORMANCE_MODE:-LATENCY}
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:8000/health || exit 1']
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 10s
    restart: unless-stopped
    volumes:
      - ov-models:/home/appuser/.cache/huggingface
      - data-prep:/tmp/dataprep
      - ov-models:${EMBEDDING_OV_MODELS_DIR:-/app/ov_models}
    networks:
      - vr_network

  vdms-vector-db:
    image: ${VDMS_IMAGE:-intellabs/vdms:v2.12.0}
    environment:
      OVERRIDE_db_root_path: /db
      OVERRIDE_images_path: /db/images
      OVERRIDE_descriptors_path: /db/descriptors
      OVERRIDE_blobs_path: /db/blobs
      OVERRIDE_pmgd_path: /db/graph
    ports:
      - '${VDMS_VDB_HOST_PORT:-55555}:55555'
    volumes:
      - vdms-db:/db
    networks:
      - vr_network

  vector-retriever:
    environment:
      RETRIEVER_BACKEND: vdms
      EMBEDDINGS_ENDPOINT: ${EMBEDDINGS_ENDPOINT:-${MULTIMODAL_EMBEDDING_ENDPOINT:-http://multimodal-embedding-serving:8000/embeddings}}
      EMBEDDING_MODEL_NAME: ${EMBEDDING_MODEL_NAME:-}
      VDMS_VDB_HOST: ${VDMS_VDB_HOST:-vdms-vector-db}
      VDMS_VDB_PORT: ${VDMS_VDB_PORT:-55555}
      SEARCH_ENGINE: ${SEARCH_ENGINE:-FaissFlat}
      DISTANCE_STRATEGY: ${DISTANCE_STRATEGY:-IP}
    depends_on:
      - multimodal-embedding-serving
      - vdms-vector-db
    networks:
      - vr_network

volumes:
  vdms-db:
    driver: local
  ov-models:
    driver: local
  data-prep:
    driver: local
