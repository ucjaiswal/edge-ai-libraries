services:
  vlm-openvino-serving:
    image: ${REGISTRY:-}vlm-openvino-serving:${TAG:-latest}
    container_name: vlm-openvino-serving
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "${VLM_SERVICE_PORT}:8000"
    ipc: host
    environment:
      no_proxy_env: ${no_proxy_env},${HOST_IP}
      no_proxy: ${no_proxy_env},${HOST_IP}
      http_proxy: ${http_proxy}
      https_proxy: ${https_proxy}
      VLM_MODEL_NAME: ${VLM_MODEL_NAME}
      VLM_COMPRESSION_WEIGHT_FORMAT: ${VLM_COMPRESSION_WEIGHT_FORMAT}
      VLM_NPU_EXPORT_PROFILE: ${VLM_NPU_EXPORT_PROFILE:-safe}
      VLM_NPU_VLM_NUM_SAMPLES: ${VLM_NPU_VLM_NUM_SAMPLES:-16}
      VLM_NPU_VLM_GROUP_SIZE: ${VLM_NPU_VLM_GROUP_SIZE:--1}
      VLM_NPU_VLM_RATIO: ${VLM_NPU_VLM_RATIO:-0.8}
      VLM_NPU_VLM_SENSITIVITY_METRIC: ${VLM_NPU_VLM_SENSITIVITY_METRIC:-mean_activation_magnitude}
      VLM_DEVICE: ${VLM_DEVICE}
      VLM_SEED: ${VLM_SEED}
      WORKERS: ${WORKERS:-1}
      VLM_MAX_COMPLETION_TOKENS: ${VLM_MAX_COMPLETION_TOKENS}
      HUGGINGFACE_TOKEN: ${HUGGINGFACE_TOKEN}
      OV_CONFIG: ${OV_CONFIG}
      VLM_LOG_LEVEL: ${VLM_LOG_LEVEL:-info}
      OPENVINO_LOG_LEVEL: ${VLM_OPENVINO_LOG_LEVEL:-1}
      VLM_ACCESS_LOG_FILE: ${VLM_ACCESS_LOG_FILE:-/dev/null}
      VLM_TELEMETRY_PATH: ${VLM_TELEMETRY_PATH:-/opt/vlm_telemetry.jsonl}
      VLM_TELEMETRY_MAX_RECORDS: ${VLM_TELEMETRY_MAX_RECORDS:-100}
    restart: unless-stopped
    devices:
      - ${DRI_MOUNT_PATH:-/dev/null}:/dev/dri
      - ${ACCEL_MOUNT_PATH:-/dev/null}:/dev/accel/accel0
    group_add:
      - ${USER_GROUP_ID:-1000}
      - ${VIDEO_GROUP_ID:-44}
      - ${RENDER_GROUP_ID:-1002}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').getcode()==200 else 1)"]
      interval: 10s
      timeout: 10s
      retries: 40
      start_period: 10s
    networks:
      - my_network
    volumes:
      - ov-models:/home/appuser/.cache/huggingface
      - ov-models:/app/ov-model
volumes:
  ov-models:
    external: true

networks:
  my_network:
    driver: bridge