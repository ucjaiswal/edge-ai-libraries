app:
  name: Audio Analyzer
  cleanup_on_exit: true
  clear_storage_on_startup: true  # delete all session folders under storage/ at startup
  use_ov_genai: True # True or False, applicable for provider: openvino

models:
  asr:
    provider: openai # openai | openvino | whispercpp
    name: whisper-base  # whisper-tiny | whisper-base | whisper-small | whisper-medium | whisper-large
    device: CPU # CPU recommended; CPU only for whispercpp, CPU or GPU for openvino provider
    weight_format: null # OpenVINO: int8 | fp16 | null. whispercpp: null | q5 | q5_0 | q5_1 | q8 | q8_0 | int5 | int8
    temperature: 0.0
    diarization: False
    hf_token: None   # needed only if diarization=true
    models_base_path: "models"

    # Hallucination filtering — openai provider uses native no_speech_prob/avg_logprob.
    # whispercpp derives the same values from per-token plog and ptsum.
    # openvino genai pipelines do not expose these fields; filtering is skipped.
    #
    # Values below are tuned for live microphone input (noisy environment).
    # Lower no_speech_threshold → stricter: flags more segments as potential noise.
    # Higher logprob_threshold  → stricter: drops low-confidence transcriptions.
    # Higher min_duration_sec / min_words → harder for noise bursts to earn the
    #   "definitely speech, keep" safety net in _is_silent_segment().
    no_speech_threshold: 0.3
    logprob_threshold: -0.3
    min_duration_sec: 0.5
    min_words: 2

    # openai-whisper transcribe() native param: skip generation over silent
    # regions longer than this many seconds.  Directly targets the
    # noise-transcribed-as-text problem.  null = disabled.
    hallucination_silence_threshold: 1.0

    # Post-processing repetition filter (all providers).
    # 1.0 = disabled. Any value > 1.0 enables consecutive repeated-phrase
    # removal (word n-gram dedup, window 1-8) and duplicate-segment stripping.
    # Note: openai-whisper's DecodingOptions has no repetition_penalty field;
    # this is applied after transcription, not inside the decoder.
    repetition_penalty: 1.8

    # Decoder controls — beam_size/best_of apply to openai and whispercpp.
    # word_timestamps and threads are whisper.cpp specific.
    beam_size: 1
    best_of: 1
    word_timestamps: false
    threads: 0

audio_preprocessing:
  chunk_duration_sec: 15
  silence_threshold: -35  # in dB
  silence_duration: 0.3   # minimum silence length in seconds
  search_window_sec: 1    # how far to look for silence if no silence exactly at chunk boundary
  chunk_output_path: chunks/
  denoise: false          # set true for noisy mic/field audio (applies ffmpeg arnndn RNNoise filter)
  denoise_model: ""       # path to .rnnn model file; leave empty to use ffmpeg built-in arnndn

audio_util:
  max_size_mb: 200
  allowed_extensions:
    - .wav
    - .mp3
    - .m4a
  chunk_size: 52428800   # 1024 * 1024 * 50 = 50MB

pipeline:
  delete_chunks_after_use: true

sentiment:
  enabled: false                  # set true to enable parallel voice sentiment analysis
  model: speechbrain/emotion-recognition-wav2vec2-IEMOCAP
  device: CPU                     # CPU | GPU (openvino export only)
  provider: openvino              # openvino | pytorch
  weight_format: int8             # Optional OpenVINO export precision, e.g. int8 | fp16
  models_base_path: "models"
  # Aggregation — how to compute session-level sentiment from per-chunk results
  # recency_weight: higher weight on recent chunks (good for kiosk drift detection)
  recency_weight: 0.7             # 0.0 = equal weight, 1.0 = last chunk only
  peak_label: angry               # label to watch for peak/escalation detection
