server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Reverse proxy for API calls
    location /api/ {
        # Allow large file uploads (for video uploads)
        client_max_body_size 2G;

        proxy_pass http://vippet:7860;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host:$server_port;

        # Handle CORS if needed
        proxy_set_header Access-Control-Allow-Origin *;
        proxy_set_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
        proxy_set_header Access-Control-Allow-Headers "Content-Type, Authorization";

        # Timeout settings
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
        proxy_read_timeout 300;
    }

    # SSE proxy for metrics stream (served by metrics-manager)
    location /metrics/stream {
        proxy_pass http://metrics-manager:9090/metrics/stream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600;
        add_header X-Accel-Buffering no;
        chunked_transfer_encoding on;
    }

    # MediaMTX streams with optional prefix
    location ^~ /mediamtx/ {
        proxy_pass http://mediamtx:8889/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support for WebRTC
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # MediaMTX stream paths and WHEP/WHIP endpoints
    # Supports both old format (stream_uuid) and new format (stream-pipelines-...)
    location ~ ^/(stream[_-][^/]+)/(whep|whip)(/.*)?$ {
        proxy_pass http://mediamtx:8889/$1/$2$3;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support for WebRTC
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # CORS headers for WebRTC
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
        add_header Access-Control-Allow-Headers "Content-Type, Authorization";

        # Handle preflight requests
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type, Authorization";
            return 204;
        }
    }

    # Video serving (supports nested subdirectories under input/output, restricted to video file extensions)
    location ~* ^/assets/videos/(input|output)/(.+\.(mp4|avi|ts))$ {
        alias /videos/$1/$2;

        # Security headers
        add_header X-Content-Type-Options nosniff;
        add_header Cache-Control "public, max-age=3600";

        # Proper MIME types for video files
        types {
            video/mp4 mp4;
            video/x-msvideo avi;
            video/mp2t ts;
        }
        default_type application/octet-stream;

        # Performance optimizations for video streaming
        sendfile on;
        tcp_nopush on;
        tcp_nodelay on;
    }

    # Image serving from the uploaded image-set tree. The regex pins the
    # allowed extensions so only real image files leave the container,
    # and the alias resolves under the shared /images volume mount.
    location ~* ^/assets/images/input/uploaded/(.+\.(jpg|jpeg|png|bmp|tif|tiff))$ {
        alias /images/input/uploaded/$1;

        # Security headers
        add_header X-Content-Type-Options nosniff;
        add_header Cache-Control "public, max-age=3600";

        # Proper MIME types for image files
        types {
            image/jpeg jpg jpeg;
            image/png png;
            image/bmp bmp;
            image/tiff tif tiff;
        }
        default_type application/octet-stream;

        # Performance optimizations
        sendfile on;
        tcp_nopush on;
        tcp_nodelay on;
    }

    # Handle client-side routing for React Router
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Basic security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Gzip compression for better performance
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/xml+rss
        application/json;

    # Cache static assets (limited to the bundled UI assets directory so that
    # React-Router paths containing dots — e.g. /images/my.dataset.v1 — are
    # not intercepted as static files and 404'd).
    location ~* ^/assets/.*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
