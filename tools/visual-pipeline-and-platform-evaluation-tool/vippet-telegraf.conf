# =============================================================================
# Telegraf Configuration for Metrics Manager
# =============================================================================
#
# This configuration collects system metrics and exposes them via:
# 1. Prometheus endpoint (scraped by the Metrics Manager for SSE streaming)
#
# To use a custom configuration, mount your own config file to:
#   /etc/telegraf/telegraf.conf
#
# Or mount additional configs to /etc/telegraf/telegraf.d/
#
# =============================================================================

# -----------------------------------------------------------------------------
# Global Agent Configuration
# -----------------------------------------------------------------------------
[agent]
  ## Default data collection interval for all inputs
  interval = "1s"

  ## Rounds collection interval to 'interval'
  round_interval = true

  ## Telegraf will send metrics to outputs in batches
  metric_batch_size = 2000

  ## Maximum number of unwritten metrics per output
  metric_buffer_limit = 20000

  ## Collection jitter
  collection_jitter = "0s"

  ## Default flushing interval for all outputs
  flush_interval = "1s"

  ## Jitter the flush interval
  flush_jitter = "0s"

  ## Precision for timestamps
  precision = "1s"

  ## Log at debug level
  debug = false

  ## Log only error level messages
  quiet = true

# -----------------------------------------------------------------------------
# Input Plugins - System Metrics
# -----------------------------------------------------------------------------

# CPU usage metrics
[[inputs.cpu]]
  percpu = false
  totalcpu = true
  collect_cpu_time = false
  report_active = false
  core_tags = false
  fieldinclude = ["usage_user", "usage_system", "usage_idle"]

# Memory usage metrics
[[inputs.mem]]
  fieldinclude = ["used_percent", "available_percent", "total", "used"]

# CPU frequency (via script)
[[inputs.exec]]
  commands = ["/app/scripts/read_cpu_freq.sh"]
  data_format = "influx"
  interval = "1s"

# GPU metrics via qmassa (Intel GPUs)
[[inputs.execd]]
  command = ["python3", "/app/scripts/qmassa_reader.py"]
  data_format = "influx"

# NPU metrics via custom reader (Intel NPU / VPU)
[[inputs.execd]]
  command = ["python3", "/app/scripts/npu_reader.py"]
  data_format = "influx"

# Temperature sensors
[[inputs.temp]]
  ## Collects all temperature sensors

# Filter temperature to only include CPU package temperature
[[processors.starlark]]
  namepass = ["temp"]
  source = '''
def apply(metric):
    return metric if metric.tags.get("sensor", "").startswith("coretemp_package_id_") else None
'''

# User-provided custom metrics via executable scripts
# Place shell scripts (.sh) or Python scripts (.py) in /app/custom-metrics/
# Scripts should output InfluxDB Line Protocol format on stdout
# Example: my_sensor.py → outputs: "my_metric value=42"
[[inputs.exec]]
  commands = ["/bin/sh -c 'for f in /app/custom-metrics/*.sh /app/custom-metrics/*.py; do [ -f \"$f\" ] && [ -x \"$f\" ] && \"$f\"; done 2>/dev/null; true'"]
  timeout = "5s"
  data_format = "influx"
  interval = "10s"

# -----------------------------------------------------------------------------
# Output Plugins
# -----------------------------------------------------------------------------

# Prometheus metrics endpoint (for scraping)
[[outputs.prometheus_client]]
  listen = ":9273"
  metric_version = 1
  path = "/metrics"
  collectors_exclude = ["gocollector", "process"]
  string_as_label = true
  export_timestamp = true

# -----------------------------------------------------------------------------
# Additional Input Examples (commented out)
# -----------------------------------------------------------------------------

# Uncomment to enable disk metrics
# [[inputs.disk]]
#   ignore_fs = ["tmpfs", "devtmpfs", "devfs", "overlay", "aufs", "squashfs"]

# Uncomment to enable network metrics
# [[inputs.net]]
#   interfaces = ["eth*", "en*"]
#   ignore_protocol_stats = true

# Uncomment to enable Docker metrics
# [[inputs.docker]]
#   endpoint = "unix:///var/run/docker.sock"
#   gather_services = false
#   container_name_include = []
#   container_name_exclude = []
#   timeout = "5s"
#   perdevice = false
#   total = true

# Uncomment to scrape Prometheus endpoints
# [[inputs.prometheus]]
#   urls = ["http://localhost:8080/metrics"]
#   metric_version = 2

# -----------------------------------------------------------------------------
# HTTP Listener for pushing metrics (InfluxDB Line Protocol)
#
# Used by the Metrics Manager FastAPI app (app/store.py) to persist custom
# metrics ingested via /api/v1/metrics* so they show up on the Prometheus
# endpoint (and therefore the SSE stream). Can also be used directly by any
# client that already speaks InfluxDB Line Protocol.
# -----------------------------------------------------------------------------

# Accept InfluxDB Line Protocol via HTTP
[[inputs.http_listener_v2]]
  service_address = ":8186"
  paths = ["/write"]
  methods = ["POST"]
  data_format = "influx"
  read_timeout = "10s"
  write_timeout = "10s"
